<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <title>Document</title>
  </head>
  <body>
    <header class="header">
      <h1>NetDB</h1>
      <nav>
        <a href="./index.html">HOME</a>
        <a href="#">MOVIES</a>
        <a href="#">TV SERIES</a>
        <a href="#">TRAILERS</a>
        <a href="#">FAVORITES</a>
        <a href="#">ABOUT US</a>
      </nav>
      <div class="box-sign">
        <a href="#">Sign In</a>
        <a href="#">Sign Up</a>
      </div>
    </header>
    <main>
      <div class="isLoading"><div class="spinner"></div></div>
      <section id="hero">
        <div class="bgImg"><img src="" alt="" /></div>
        <div class="heroContent">
          <img src="" alt="" />
          <div class="detailContent">
            <div class="titleContent">
              <h2></h2>
              <span></span>
            </div>
            <div class="genre_dates_runtime">
              <div class="dates"></div>
              <span>&bull;</span>
              <div class="genres"></div>
              <span>&bull;</span>
              <div class="runtime"></div>
            </div>
            <div class="buttonPlayTrailer">
              <a href="#" class="btn-add-list"
                ><svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 16 16"
                  fill="currentColor"
                  class="size-4"
                >
                  <path
                    fill-rule="evenodd"
                    d="M11.986 3H12a2 2 0 0 1 2 2v6a2 2 0 0 1-1.5 1.937V7A2.5 2.5 0 0 0 10 4.5H4.063A2 2 0 0 1 6 3h.014A2.25 2.25 0 0 1 8.25 1h1.5a2.25 2.25 0 0 1 2.236 2ZM10.5 4v-.75a.75.75 0 0 0-.75-.75h-1.5a.75.75 0 0 0-.75.75V4h3Z"
                    clip-rule="evenodd"
                  />
                  <path
                    fill-rule="evenodd"
                    d="M3 6a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1V7a1 1 0 0 0-1-1H3Zm1.75 2.5a.75.75 0 0 0 0 1.5h3.5a.75.75 0 0 0 0-1.5h-3.5ZM4 11.75a.75.75 0 0 1 .75-.75h3.5a.75.75 0 0 1 0 1.5h-3.5a.75.75 0 0 1-.75-.75Z"
                    clip-rule="evenodd"
                  />
                </svg>
              </a>
              <a href="#" class="btn-fav"
                ><svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="currentColor"
                  class="size-6"
                >
                  <path
                    d="m11.645 20.91-.007-.003-.022-.012a15.247 15.247 0 0 1-.383-.218 25.18 25.18 0 0 1-4.244-3.17C4.688 15.36 2.25 12.174 2.25 8.25 2.25 5.322 4.714 3 7.688 3A5.5 5.5 0 0 1 12 5.052 5.5 5.5 0 0 1 16.313 3c2.973 0 5.437 2.322 5.437 5.25 0 3.925-2.438 7.111-4.739 9.256a25.175 25.175 0 0 1-4.244 3.17 15.247 15.247 0 0 1-.383.219l-.022.012-.007.004-.003.001a.752.752 0 0 1-.704 0l-.003-.001Z"
                  />
                </svg>
              </a>
              <a href="#" class="btn-watchlist"
                ><svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="currentColor"
                  class="size-6"
                >
                  <path
                    fill-rule="evenodd"
                    d="M6.32 2.577a49.255 49.255 0 0 1 11.36 0c1.497.174 2.57 1.46 2.57 2.93V21a.75.75 0 0 1-1.085.67L12 18.089l-7.165 3.583A.75.75 0 0 1 3.75 21V5.507c0-1.47 1.073-2.756 2.57-2.93Z"
                    clip-rule="evenodd"
                  />
                </svg>
              </a>
              <button class="btn-playtrailer">&#9658; Play Trailer</button>
            </div>
            <div class="tagLine"></div>
            <br />
            <h3 class="fontOverview">Overview</h3>
            <br />
            <p class="textOverview"></p>
          </div>
        </div>
      </section>
      <div class="modal-video">
        <div class="modal-inner">
          <div class="header-modal">
            <h2>Play Trailer</h2>
            <button type="button" class="btn-close-modal">&times;</button>
          </div>

          <iframe
            width="100%"
            height="100%"
            src=""
            title="YouTube video player"
            frameborder="0"
            allow="
              accelerometer;
              autoplay;
              clipboard-write;
              encrypted-media;
              gyroscope;
              picture-in-picture;
              web-share;
            "
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen
          ></iframe>
        </div>
      </div>
    </main>
    <script type="module" src="./scripts/detail-script.js"></script>
  </body>
</html>
