<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./assets/css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Intel+One+Mono:ital,wght@0,300..700;1,300..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="header">
      <h1>NetDB</h1>
      <nav>
        <a href="#">HOME</a>
        <a href="#">MOVIES</a>
        <a href="#">TV SERIES</a>
        <a href="#">TRAILERS</a>
        <a href="#">NEWS</a>
        <a href="#">ABOUT US</a>
      </nav>
      <div class="box-sign">
        <a href="#">Sign In</a>
        <a href="#">Sign Up</a>
      </div>
    </header>
    <main>
      <section id="searching" class="searchSection">
        <h2>Movie Search</h2>
        <p>Cari Film Favoritmu!</p>
        <form id="formInput" class="search-box">
          <input
            class="inputBox"
            type="search"
            placeholder="Ketik Judul Film.."
          />
          <button type="submit" id="submitSearch" class="buttonSubmit">
            Search
          </button>
        </form>
        <div class="listMovieFilter">
        </div>
        <div class="isLoading"></div>
      </section>
      <!-- <section class="sectionNowPlaying" id="nowPlaying">
        <h2>Now Playing Movies</h2>
        <div class="movie-list"></div>
      </section>  -->
    </main>
    <script type="module" src="./scripts/search.js"></script>
    <!-- <script type="module" src="./scripts/script.js"></script>  -->
    
  </body>
</html>
